<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soil Boring Log Analysis - BH-1</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useRef, useMemo, useCallback, useReducer, useContext, createContext, Fragment } = React;

      import React, { useState } from 'react';
import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, LineChart, Line, AreaChart, Area } from 'recharts';

const soilData = [
  {
    layer: 1,
    depthStart: 0,
    depthEnd: 15.8,
    description: 'Sandy material',
    nValue: 9,
    phi: 29,
    sieve200: 42,
    su: null,
    type: 'Sand'
  },
  {
    layer: 2,
    depthStart: 15.8,
    depthEnd: 16.95,
    description: 'Clay layers, high plasticity',
    nValue: null,
    phi: 0,
    sieve200: null,
    su: 5.6,
    type: 'Clay'
  },
  {
    layer: 3,
    depthStart: 16.95,
    depthEnd: 18.45,
    description: 'Clay layer, transition zone',
    nValue: 14,
    phi: 0,
    sieve200: null,
    su: null,
    type: 'Clay'
  },
  {
    layer: 4,
    depthStart: 18.45,
    depthEnd: 21.45,
    description: 'Clay layers',
    nValue: 19,
    phi: 0,
    sieve200: 51,
    su: 38.5,
    type: 'Clay'
  },
  {
    layer: 5,
    depthStart: 21.45,
    depthEnd: 27.45,
    description: 'Clay layers',
    nValue: 32,
    phi: 0,
    sieve200: 55,
    su: null,
    type: 'Clay'
  },
  {
    layer: 6,
    depthStart: 27.45,
    depthEnd: 30.45,
    description: 'Sandy material, non-plastic',
    nValue: 74,
    phi: 40,
    sieve200: 17,
    su: null,
    type: 'Sand'
  }
];

const SoilBoringDashboard = () => {
  const [selectedLayer, setSelectedLayer] = useState(null);
  const [activeTab, setActiveTab] = useState('profile');

  const getSoilColor = (type) => {
    return type === 'Sand' ? '#D2B48C' : '#8B4513';
  };

  const getNValueCategory = (n) => {
    if (n === null) return 'N/A';
    if (n < 10) return 'Very Loose';
    if (n < 30) return 'Loose';
    if (n < 50) return 'Medium';
    if (n < 100) return 'Dense';
    return 'Very Dense';
  };

  const nValueData = soilData.map(layer => ({
    name: `Layer ${layer.layer}`,
    depth: (layer.depthStart + layer.depthEnd) / 2,
    nValue: layer.nValue || 0,
    category: getNValueCategory(layer.nValue)
  })).filter(d => d.nValue > 0);

  const phiData = soilData.map(layer => ({
    name: `Layer ${layer.layer}`,
    depth: (layer.depthStart + layer.depthEnd) / 2,
    phi: layer.phi
  })).filter(d => d.phi > 0);

  const suData = soilData.map(layer => ({
    name: `Layer ${layer.layer}`,
    depth: (layer.depthStart + layer.depthEnd) / 2,
    su: layer.su || 0
  })).filter(d => d.su > 0);

  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">
      <div className="max-w-7xl mx-auto">
        {/* Header */}
        <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
          <h1 className="text-3xl font-bold text-gray-800 mb-2">Soil Boring Log Analysis - BH-1</h1>
          <p className="text-gray-600">Project No: 2024-001 | Total Depth: 30.0m</p>
        </div>

        {/* Tabs */}
        <div className="bg-white rounded-xl shadow-lg mb-6">
          <div className="flex border-b border-gray-200">
            {['profile', 'n-values', 'properties'].map(tab => (
              <button
                key={tab}
                onClick={() => setActiveTab(tab)}
                className={`px-6 py-3 font-medium transition-colors ${
                  activeTab === tab
                    ? 'border-b-2 border-blue-500 text-blue-600'
                    : 'text-gray-600 hover:text-gray-800'
                }`}
              >
                {tab === 'profile' ? 'Soil Profile' : 
                 tab === 'n-values' ? 'SPT N-Values' : 'Soil Properties'}
              </button>
            ))}
          </div>

          <div className="p-6">
            {activeTab === 'profile' && (
              <div className="space-y-6">
                <h2 className="text-xl font-semibold text-gray-800 mb-4">Soil Layer Profile</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {soilData.map((layer) => (
                    <div
                      key={layer.layer}
                      onClick={() => setSelectedLayer(layer)}
                      className={`border-2 rounded-lg p-4 cursor-pointer transition-all ${
                        selectedLayer?.layer === layer.layer
                          ? 'border-blue-500 bg-blue-50'
                          : 'border-gray-200 hover:border-blue-300'
                      }`}
                    >
                      <div className="flex items-center mb-3">
                        <div
                          className="w-8 h-8 rounded mr-3"
                          style={{ backgroundColor: getSoilColor(layer.type) }}
                        ></div>
                        <div>
                          <h3 className="font-bold text-gray-800">Layer {layer.layer}</h3>
                          <p className="text-sm text-gray-600">{layer.depthStart.toFixed(1)}m - {layer.depthEnd.toFixed(1)}m</p>
                        </div>
                      </div>
                      <p className="text-gray-700 mb-2">{layer.description}</p>
                      <div className="grid grid-cols-2 gap-2 text-sm">
                        {layer.nValue && (
                          <div className="bg-gray-100 p-2 rounded">
                            <span className="text-gray-600">N-Value:</span>
                            <span className="ml-2 font-semibold">{layer.nValue}</span>
                            <span className="ml-1 text-xs text-gray-500">({getNValueCategory(layer.nValue)})</span>
                          </div>
                        )}
                        {layer.phi > 0 && (
                          <div className="bg-gray-100 p-2 rounded">
                            <span className="text-gray-600">φ:</span>
                            <span className="ml-2 font-semibold">{layer.phi}°</span>
                          </div>
                        )}
                        {layer.su && (
                          <div className="bg-gray-100 p-2 rounded">
                            <span className="text-gray-600">Su:</span>
                            <span className="ml-2 font-semibold">{layer.su} kPa</span>
                          </div>
                        )}
                        {layer.sieve200 && (
                          <div className="bg-gray-100 p-2 rounded">
                            <span className="text-gray-600">#200:</span>
                            <span className="ml-2 font-semibold">{layer.sieve200}%</span>
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {activeTab === 'n-values' && (
              <div className="space-y-6">
                <h2 className="text-xl font-semibold text-gray-800 mb-4">SPT N-Values vs Depth</h2>
                <ResponsiveContainer width="100%" height={400}>
                  <BarChart data={nValueData} layout="vertical" margin={{ top: 20, right: 30, left: 40, bottom: 5 }}>
                    <CartesianGrid strokeDasharray="3 3" />
                    <XAxis type="number" label={{ value: 'N-Value (blows/30cm)', position: 'bottom' }} />
                    <YAxis dataKey="depth" type="number" domain={[0, 32]} label={{ value: 'Depth (m)', angle: -90, position: 'insideLeft' }} />
                    <Tooltip 
                      formatter={(value, name, props) => {
                        if (name === 'nValue') {
                          return [value, 'N-Value'];
                        }
                        return [value, 'Depth'];
                      }}
                      contentStyle={{ backgroundColor: '#fff', border: '1px solid #ccc' }}
                    />
                    <Legend />
                    <Bar dataKey="nValue" name="N-Value" fill="#4CAF50" radius={[0, 4, 4, 0]} />
                  </BarChart>
                </ResponsiveContainer>
                
                <div className="bg-blue-50 p-4 rounded-lg">
                  <h3 className="font-semibold text-blue-800 mb-2">N-Value Classification:</h3>
                  <div className="grid grid-cols-2 md:grid-cols-5 gap-2 text-sm">
                    <div className="bg-green-100 p-2 rounded">Very Loose: &lt;10</div>
                    <div className="bg-yellow-100 p-2 rounded">Loose: 10-30</div>
                    <div className="bg-orange-100 p-2 rounded">Medium: 30-50</div>
                    <div className="bg-red-100 p-2 rounded">Dense: 50-100</div>
                    <div className="bg-purple-100 p-2 rounded">Very Dense: &gt;100</div>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'properties' && (
              <div className="space-y-6">
                <h2 className="text-xl font-semibold text-gray-800 mb-4">Soil Properties Comparison</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div>
                    <h3 className="font-semibold text-gray-700 mb-3">Friction Angle (φ)</h3>
                    <ResponsiveContainer width="100%" height={300}>
                      <BarChart data={phiData} layout="vertical">
                        <CartesianGrid strokeDasharray="3 3" />
                        <XAxis type="number" label={{ value: 'φ (degrees)', position: 'bottom' }} />
                        <YAxis dataKey="depth" type="number" domain={[0, 32]} />
                        <Tooltip />
                        <Bar dataKey="phi" fill="#2196F3" radius={[0, 4, 4, 0]} />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                  
                  <div>
                    <h3 className="font-semibold text-gray-700 mb-3">Undrained Shear Strength (Su)</h3>
                    <ResponsiveContainer width="100%" height={300}>
                      <BarChart data={suData} layout="vertical">
                        <CartesianGrid strokeDasharray="3 3" />
                        <XAxis type="number" label={{ value: 'Su (kPa)', position: 'bottom' }} />
                        <YAxis dataKey="depth" type="number" domain={[0, 32]} />
                        <Tooltip />
                        <Bar dataKey="su" fill="#FF9800" radius={[0, 4, 4, 0]} />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div className="bg-green-50 p-4 rounded-lg">
                  <h3 className="font-semibold text-green-800 mb-3">Key Findings:</h3>
                  <ul className="space-y-2 text-gray-700">
                    <li>• Upper layer (0-15.8m): Loose sand (N=9, φ=29°)</li>
                    <li>• Middle section (15.8-27.45m): Clay layers with high plasticity</li>
                    <li>• Lower layer (27.45-30.45m): Dense sand (N=74, φ=40°)</li>
                    <li>• Significant increase in soil density with depth</li>
                    <li>• High plasticity clay indicates potential for swelling/shrinkage</li>
                  </ul>
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Summary Statistics */}
        <div className="bg-white rounded-xl shadow-lg p-6">
          <h2 className="text-xl font-semibold text-gray-800 mb-4">Summary Statistics</h2>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div className="bg-blue-50 p-4 rounded-lg text-center">
              <div className="text-2xl font-bold text-blue-600">6</div>
              <div className="text-gray-600">Soil Layers</div>
            </div>
            <div className="bg-green-50 p-4 rounded-lg text-center">
              <div className="text-2xl font-bold text-green-600">30.0</div>
              <div className="text-gray-600">Total Depth (m)</div>
            </div>
            <div className="bg-orange-50 p-4 rounded-lg text-center">
              <div className="text-2xl font-bold text-orange-600">74</div>
              <div className="text-gray-600">Max N-Value</div>
            </div>
            <div className="bg-purple-50 p-4 rounded-lg text-center">
              <div className="text-2xl font-bold text-purple-600">40°</div>
              <div className="text-gray-600">Max φ Angle</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

export default SoilBoringDashboard;
    </script>
</body>
</html>
