<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- Left ear -->
  <path d="M12 8 L8 22 L20 18 Z" fill="#f97316" stroke="#fff" stroke-width="1.5"/>
  <path d="M13 12 L11 20 L18 17 Z" fill="#fbbf24"/>
  <!-- Right ear -->
  <path d="M52 8 L56 22 L44 18 Z" fill="#f97316" stroke="#fff" stroke-width="1.5"/>
  <path d="M51 12 L53 20 L46 17 Z" fill="#fbbf24"/>
  <!-- Face -->
  <ellipse cx="32" cy="34" rx="20" ry="22" fill="#fbbf24"/>
  <!-- White muzzle -->
  <ellipse cx="32" cy="42" rx="12" ry="10" fill="#fff"/>
  <!-- Stripes on forehead -->
  <path d="M26 18 L28 26" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
  <path d="M32 16 L32 24" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M38 18 L36 26" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
  <!-- Side stripes -->
  <path d="M16 28 L22 30" stroke="#92400e" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M15 34 L21 35" stroke="#92400e" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M48 28 L42 30" stroke="#92400e" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M49 34 L43 35" stroke="#92400e" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="24" cy="32" rx="4" ry="4.5" fill="#fff"/>
  <ellipse cx="40" cy="32" rx="4" ry="4.5" fill="#fff"/>
  <ellipse cx="25" cy="32" rx="2.5" ry="3" fill="#1e3a5f"/>
  <ellipse cx="41" cy="32" rx="2.5" ry="3" fill="#1e3a5f"/>
  <circle cx="26" cy="31" r="1" fill="#fff"/>
  <circle cx="42" cy="31" r="1" fill="#fff"/>
  <!-- Nose -->
  <path d="M30 40 L32 43 L34 40 Z" fill="#92400e"/>
  <!-- Mouth -->
  <path d="M32 43 Q28 47 26 45" fill="none" stroke="#92400e" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M32 43 Q36 47 38 45" fill="none" stroke="#92400e" stroke-width="1.2" stroke-linecap="round"/>
