                       top: `${(layer.Depth_From / 20) * 100}%`,\n                        height: `${((layer.Depth_To - layer.Depth_From) / 20) * 100}%`,\n                        backgroundColor: getSoilColor(layer.Soil_Class)\n                      }}\n                    >\n                      {layer.Soil_Class || '?'}\n                    </div>\n                  ))}\n                </div>\n                <div className=\"absolute left-16 top-0 bottom-0 right-0 bg-gray-50 p-4\">\n                  {soilProfileData.map((layer, idx) => (\n                    <div\n                      key={idx}\n                      className=\"mb-1 p-2 rounded text-xs text-white\"\n                      style={{ backgroundColor: getSoilColor(layer.Soil_Class) }}\n                    >\n                      {layer.Depth_From}-{layer.Depth_To}m: {layer.Soil_Class || 'Unknown'}\n                    </div>\n                  ))}\n                </div>\n              </div>\n            </div>\n\n            {/* N-Value Chart */}\n            <div className=\"bg-white rounded-2xl shadow-xl p-6\">\n              <h2 className=\"text-xl font-bold text-gray-800 mb-4\">N-Value vs Depth</h2>\n              <ResponsiveContainer width=\"100%\" height={350}>\n                <BarChart data={nValueChartData} layout=\"vertical\" margin={{ left: 40 }}>\n                  <CartesianGrid strokeDasharray=\"3 3\" />\n                  <XAxis type=\"number\" label={{ value: 'N-Value', position: 'insideBottom', offset: -5 }} />\n                  <YAxis dataKey=\"depth\" type=\"number\" domain={[0, 20]} label={{ value: 'Depth (m)', angle: -90, position: 'insideLeft' }} />\n                  <Tooltip formatter={(value) => [`${value}`, 'N-Value']} />\n                  <Bar dataKey=\"N_value\" fill=\"#4F46E5\" radius={[0, 4, 4, 0]} />\n                </BarChart>\n              </ResponsiveContainer>\n            </div>\n          </div>\n        )}\n\n        {/* Analysis Tab */}\n        {activeTab === 'analysis' && (\n          <div className=\"grid grid-cols-1 lg:grid-cols-2 gap-6\">\n            {/* Soil Class Distribution */}\n            <div className=\"bg-white rounded-2xl shadow-xl p-6\">\n              <h2 className=\"text-xl font-bold text-gray-800 mb-4\">Soil Class Distribution</h2>\n              <ResponsiveContainer width=\"100%\" height={300}>\n                <PieChart>\n                  <Pie\n                    data={soilClassDistribution}\n                    cx=\"50%\"\n                    cy=\"50%\"\n                    labelLine={false}\n                    label={({ name, percent }) => `${name} ${(percent * 100).toFixed(0)}%`}\n                    outerRadius={80}\n                    fill=\"#8884d8\"\n                    dataKey=\"value\"\n                  >\n                    {soilClassDistribution.map((entry, index) => (\n                      <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />\n                    ))}\n                  </Pie>\n                  <Tooltip />\n                </PieChart>\n              </ResponsiveContainer>\n            </div>\n\n            {/* N-Value Trend */}\n            <div className=\"bg-white rounded-2xl shadow-xl p-6\">\n              <h2 className=\"text-xl font-bold text-gray-800 mb-4\">N-Value Trend with Depth</h2>\n              <ResponsiveContainer width=\"100%\" height={300}>\n                <LineChart data={nValueChartData} margin={{ left: 40 }}>\n                  <CartesianGrid strokeDasharray=\"3 3\" />\n                  <XAxis dataKey=\"depth\" label={{ value: 'Depth (m)', position: 'insideBottom', offset: -5 }} />\n                  <YAxis label={{ value: 'N-Value', angle: -90, position: 'insideLeft' }} />\n                  <Tooltip />\n                  <Legend />\n                  <Line type=\"monotone\" dataKey=\"N_value\" stroke=\"#4F46E5\" strokeWidth={2} dot={{ r: 4 }} />\n                </LineChart>\n              </ResponsiveContainer>\n            </div>\n\n            {/* Friction Angle Chart */}\n            <div className=\"bg-white rounded-2xl shadow-xl p-6\">\n              <h2 className=\"text-xl font-bold text-gray-800 mb-4\

        // Render the component
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
      } catch (err) {
        document.getElementById('root').innerHTML = '<div class="react-error">Error: ' + err.message + '</div>';
